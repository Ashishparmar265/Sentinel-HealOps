apiVersion: apps/v1
kind: Deployment
metadata:
  # Generic template — replace <service-name> with your actual service name
  # and add an entry to governor/targets.json before applying.
  name: <service-name>
  labels:
    app: <service-name>
    managed-by: sentinel-healops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: <service-name>
  template:
    metadata:
      labels:
        app: <service-name>
    spec:
      containers:
      - name: service
        image: <your-image>:<tag>
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        resources:
          requests:
            cpu: "250m"
            memory: "128Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 15
